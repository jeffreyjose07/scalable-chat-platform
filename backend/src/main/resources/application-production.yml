spring:
  profiles:
    active: production
    
  # PostgreSQL Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/chatdb}
    username: ${DATABASE_USERNAME:chatuser}
    password: ${DATABASE_PASSWORD:chatpass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      
  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
        
  # MongoDB Configuration
  data:
    mongodb:
      uri: ${MONGODB_URL:mongodb://localhost:27017/chatdb}
      database: chatdb
      auto-index-creation: true
      
  # Redis Configuration
  redis:
    url: ${REDIS_URL:redis://localhost:6379}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        
  # Kafka Configuration (using Upstash/CloudKarafka)
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    security:
      protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
    sasl:
      mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      jaas:
        config: ${KAFKA_SASL_JAAS_CONFIG:}
    consumer:
      group-id: chat-platform-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      
    
# Server Configuration
server:
  port: ${PORT:8080}
  compression:
    enabled: true
  http2:
    enabled: true
    
# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://your-frontend-domain.vercel.app,http://localhost:3000}
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  
# WebSocket Configuration
websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:https://your-frontend-domain.vercel.app,http://localhost:3000}
  
# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-very-secure-jwt-secret-key-change-this-in-production}
  expiration: 86400000 # 24 hours
  
# Logging Configuration
logging:
  level:
    com.chatplatform: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    
# Management/Health Check Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      
# Application Configuration
app:
  name: Scalable Chat Platform
  version: 1.0.0
  description: Real-time chat platform with Spring Boot and React
  
# Production Optimizations
spring.jpa.open-in-view: false
spring.devtools.restart.enabled: false
spring.devtools.livereload.enabled: false